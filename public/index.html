<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simple AI</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">
<i class="fas fa-robot"></i>
<i class="fas fa-home"></i>
<i class="fas fa-file-alt"></i>
<i class="fas fa-plus"></i>
</div>


<!-- MAIN LAYOUT -->

<div class="main">


<!-- CHAT PANEL -->

<div class="chat-panel">

<div class="chat-header">
Ask SimpleAI
</div>

<div id="chatMessages" class="chat-messages">

<div class="chat-bubble">
Hi! Ask me to summarize or generate notes.
</div>

</div>

<form id="chatForm" class="chat-input">

<input id="userMessage" placeholder="Ask anything..." />

<button type="submit">
<i class="fas fa-paper-plane"></i>
</button>

</form>

</div>


<!-- NOTES PANEL -->

<div class="notes-panel">

<div class="header">
My Notes
</div>

<div class="notes-content">


<!-- CREATE NOTE -->

<div class="create-box">

<form id="createNoteForm">

<textarea id="noteContent" placeholder="Write your note..."></textarea>

<button class="primary" type="submit">
Save Note
</button>

</form>

</div>


<!-- NOTES GRID -->

<div id="notesGrid"></div>


</div>
</div>

</div>
<!-- NOTE VIEW MODAL -->

<div id="noteModal" class="note-modal">
  <div class="note-modal-content">

    <button id="closeModal" class="close-modal">
      <i class="fas fa-times"></i>
    </button>

    <h2 id="modalTitle"></h2>

    <div id="modalContent"></div>

    <div id="modalDate" class="modal-date"></div>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
